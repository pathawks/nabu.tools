name: Terraform

on:
  push:
    branches: [main]
    paths: [terraform/**]
  pull_request:
    paths: [terraform/**]

concurrency:
  group: terraform
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v4

      - run: terraform init
      - run: terraform fmt -check
      - run: terraform plan -var="domain=nabu.tools" -input=false

      - if: github.ref == 'refs/heads/main'
        run: terraform apply -var="domain=nabu.tools" -input=false -auto-approve
